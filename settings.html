<div id="ce-settings-container" class="ce-settings-panel">
    <div class="ce-header">
        <h2><span class="ce-icon">📝</span> 角色提取器设置</h2>
        <p class="ce-subtitle">自动从对话中提取角色信息，按模板格式写入世界书</p>
    </div>

    <div class="ce-section">
        <div class="ce-toggle-row">
            <label class="ce-toggle-label">
                <span class="ce-toggle-text">启用插件</span>
                <input type="checkbox" id="ce-enabled" class="ce-toggle-input">
                <span class="ce-toggle-slider"></span>
            </label>
            <span class="ce-toggle-hint" id="ce-status-text">● 已启用</span>
        </div>
    </div>

    <div class="ce-section">
        <div class="ce-section-title">🔌 API 配置</div>
        <div class="ce-field">
            <label for="ce-apiurl">API 地址</label>
            <input type="text" id="ce-apiurl" placeholder="https://api.openai.com/v1/chat/completions">
        </div>
        <div class="ce-field">
            <label for="ce-apikey">API Key</label>
            <input type="password" id="ce-apikey" placeholder="sk-...">
        </div>
        <div class="ce-field">
            <label for="ce-model">模型名称</label>
            <input type="text" id="ce-model" placeholder="gpt-3.5-turbo">
        </div>
    </div>

    <div class="ce-section">
        <div class="ce-section-title">⚙️ 提取设置</div>
        <div class="ce-field ce-field-inline">
            <label for="ce-maxmessages">分析最近消息数</label>
            <input type="number" id="ce-maxmessages" min="5" max="100" value="20">
            <span class="ce-field-hint">条</span>
        </div>
        <div class="ce-field ce-field-inline">
            <label for="ce-temperature">AI 温度</label>
            <input type="number" id="ce-temperature" min="0" max="1" step="0.05" value="0.3">
        </div>
    </div>

    <div class="ce-section">
        <div class="ce-section-title">📋 世界书写入设置</div>
        <div class="ce-field">
            <label>
                <input type="checkbox" id="ce-overwrite"> 遇到同名角色时覆盖已有条目
            </label>
        </div>
        <div class="ce-field">
            <label>
                <input type="checkbox" id="ce-auto-open" checked> 写入后自动打开世界书面板
            </label>
        </div>
    </div>

    <div class="ce-actions">
        <button id="ce-save-btn" class="ce-btn ce-btn-primary">💾 保存设置</button>
        <button id="ce-test-btn" class="ce-btn ce-btn-secondary">🔍 测试连接</button>
        <button id="ce-reset-btn" class="ce-btn ce-btn-danger">↺ 重置默认</button>
    </div>

    <div id="ce-toast" class="ce-toast" style="display:none;"></div>
</div>
